name: Release-plz

on:
  push:
    branches:
      - main

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

permissions:
  pull-requests: write
  contents: write
  id-token: write # OIDC token for crates.io Trusted Publishing (build198x-adf)

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # release-plz needs full history to diff the changelog from the
          # last tag.
          fetch-depth: 0
          # The `release` step below pushes the version tag with this token. A
          # tag pushed by GITHUB_TOKEN does NOT trigger other workflows, so the
          # per-org RELEASE_PLZ_TOKEN (a fine-grained PAT) is required for the
          # tag to fire cargo-dist's release.yml.
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Read pinned toolchain
        id: toolchain
        run: |
          channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}

      # Two steps, the release-plz two-command model: release-pr opens/updates
      # the "chore: release" PR for new commits; release tags any version in
      # Cargo.toml that isn't yet tagged (i.e. once that PR is merged) and the
      # tag push fires cargo-dist's release.yml.
      - name: Run release-plz (open/update release PR)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run release-plz (tag merged releases)
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}

      # Publish build198x-adf to crates.io over Trusted Publishing (OIDC — no
      # stored registry token). Only build198x-adf goes to crates.io; build198x
      # and mediaspec stay publish = false (the binary ships via cargo-dist,
      # mediaspec is git-rev-consumed). Gated on releases_created, so OIDC runs
      # only on an actual release; the guard skips a version already published
      # (re-runs). build198x-adf is lockstep with build198x by design — its
      # crates.io version tracks the tool suite.
      # Whether build198x-adf's current version is already on crates.io is the
      # real signal — not releases_created, which is perpetually true here
      # (under git_only the lockstep crates have no per-package tag baseline, so
      # release-plz reports them "released (git-only)" every run). Checking
      # *before* authenticating means an already-published version skips without
      # touching OIDC, so ordinary pushes stay green and don't depend on Trusted
      # Publishing being configured.
      - name: Check whether build198x-adf needs publishing
        id: check
        run: |
          set -euo pipefail
          crate=build198x-adf
          version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r --arg c "$crate" '.packages[] | select(.name==$c) | .version')
          if curl -sf -A "198x-ci (steve@stevehill.xyz)" \
               "https://crates.io/api/v1/crates/$crate/$version" >/dev/null; then
            echo "$crate $version already on crates.io — skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$crate $version not yet published"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to crates.io (Trusted Publishing)
        if: steps.check.outputs.publish == 'true'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish build198x-adf
        if: steps.check.outputs.publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p build198x-adf
